<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A7A6B">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>{% block title %}MediCare AI{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/medicare.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ── Auth page layout ─────────────────────────────────────────────────────── */
.auth-page {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--bg);
  animation: authFadeIn 0.5s ease-out;
}
@keyframes authFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ── Brand Panel (left) ──────────────────────────────────────────────────── */
.auth-brand-panel {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-600) 60%, #043830 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 48px;
  position: relative; overflow: hidden; color: white;
}
.auth-brand-panel::before {
  content: ''; position: absolute; top: -100px; right: -100px;
  width: 400px; height: 400px;
  background: rgba(255,255,255,0.04); border-radius: 50%;
}
.auth-brand-panel::after {
  content: ''; position: absolute; bottom: -80px; left: -60px;
  width: 300px; height: 300px;
  background: rgba(255,255,255,0.03); border-radius: 50%;
}
.auth-brand-content { position: relative; z-index: 1; max-width: 420px; }
.auth-brand-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; }
.auth-brand-logo-icon {
  width: 48px; height: 48px;
  background: rgba(255,255,255,0.15); border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
}
.auth-brand-logo h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em; color: #fff; }
.auth-brand-headline {
  font-size: 2rem; font-weight: 800; line-height: 1.2;
  letter-spacing: -0.04em; margin-bottom: 20px; color: #fff;
}
.auth-brand-sub { font-size: 0.95rem; opacity: 0.75; line-height: 1.7; margin-bottom: 40px; }
.auth-feature-list { display: flex; flex-direction: column; gap: 14px; }
.auth-feature-item { display: flex; align-items: center; gap: 12px; font-size: 0.875rem; opacity: 0.85; }
.auth-feat-icon {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.12); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; flex-shrink: 0;
}

/* ── Form Panel (right) ──────────────────────────────────────────────────── */
.auth-form-panel {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 48px 40px; overflow-y: auto;
  background: linear-gradient(180deg, #F8FAFB 0%, #EEF3F6 100%);
}
.auth-form-box {
  width: 100%; max-width: 420px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 36px 32px;
  border: 1px solid rgba(255,255,255,0.5);
  box-shadow: 0 8px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.05);
  animation: cardSlideUp 0.6s cubic-bezier(0.16,1,0.3,1);
}
@keyframes cardSlideUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.auth-form-header { margin-bottom: 32px; }
.auth-form-header h2 {
  font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em;
  color: var(--text); margin-bottom: 6px;
}
.auth-form-header p { font-size: 0.9rem; color: var(--text-muted); }
.auth-form-header .email-highlight { color: var(--primary); font-weight: 600; }

/* ── Form elements ───────────────────────────────────────────────────────── */
.form-group { margin-bottom: 1.25rem; }
.form-label {
  display: block; font-size: 0.78rem; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 6px;
}
.input-group { position: relative; }
.input-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 0.85rem; pointer-events: none;
}
.form-control {
  width: 100%; padding: 11px 14px 11px 40px;
  border: 1.5px solid var(--border); border-radius: var(--radius-md);
  font-family: var(--font-body); font-size: 0.88rem;
  color: var(--text); background: var(--surface);
  transition: var(--transition); box-sizing: border-box;
}
.form-control:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(10,122,107,0.1);
  background: #FAFFFE;
}
.form-group.focused .form-label { color: var(--primary); }
.form-control.error { border-color: var(--danger); }
.form-error {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.75rem; color: var(--danger); margin-top: 4px; font-weight: 500;
}
.form-hint { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 20px; border-radius: var(--radius-md);
  font-family: var(--font-display); font-weight: 600; font-size: 0.88rem;
  cursor: pointer; transition: var(--transition); border: none;
}
.btn-primary {
  background: var(--primary); color: #fff;
}
.btn-primary:hover {
  background: var(--primary-light); transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(10,122,107,0.25);
}
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-outline {
  background: transparent; border: 1.5px solid var(--border); color: var(--text);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-ghost { background: none; color: var(--primary); padding: 8px 16px; }
.btn-ghost:hover { background: var(--primary-50); }
.btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-lg { padding: 13px 24px; font-size: 0.95rem; }
.btn-sm { padding: 7px 14px; font-size: 0.8rem; }
.btn-block { width: 100%; }
.mt-4 { margin-top: 1rem; }
.btn.loading .btn-text { visibility: hidden; }
.btn.loading { position: relative; pointer-events: none; }
.btn.loading::after {
  content: ''; position: absolute;
  width: 20px; height: 20px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Flash messages ──────────────────────────────────────────────────────── */
.flash-msg {
  padding: 12px 16px; border-radius: var(--radius-lg);
  font-size: var(--text-sm); margin-bottom: 20px;
  display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
}
.flash-msg.success { background: var(--success-bg); color: #065f46; border: 1px solid #86EFAC; }
.flash-msg.error   { background: var(--danger-bg);  color: #991b1b; border: 1px solid #FCA5A5; }
.flash-msg.warning { background: var(--warning-bg); color: #92400e; border: 1px solid #FDE68A; }
.flash-msg.info    { background: var(--info-bg);    color: #0c4a6e; border: 1px solid #BAE6FD; }

/* ── Password strength ───────────────────────────────────────────────────── */
.pw-strength-bar { height: 4px; background: var(--border); border-radius: var(--radius-full); margin-top: 6px; overflow: hidden; }
.pw-strength-fill { height: 100%; border-radius: var(--radius-full); transition: width 0.3s, background 0.3s; }
.pw-strength-text { font-size: 0.7rem; margin-top: 4px; font-weight: 600; }

/* ── Show/hide password ──────────────────────────────────────────────────── */
.pw-toggle-wrap { position: relative; }
.pw-toggle-btn {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); cursor: pointer; font-size: 0.85rem;
  padding: 4px; background: none; border: none;
}
.pw-toggle-wrap .form-control { padding-right: 40px; padding-left: 14px; }

/* ── Auth links ──────────────────────────────────────────────────────────── */
.auth-links { text-align: center; margin-top: 24px; font-size: var(--text-sm); color: var(--text-muted); }
.auth-links a { color: var(--primary); font-weight: 600; text-decoration: none; }
.auth-links a:hover { text-decoration: underline; }

/* ── Divider ─────────────────────────────────────────────────────────────── */
.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--text-muted); font-size: var(--text-xs);
}
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .auth-page { grid-template-columns: 1fr; }
  .auth-brand-panel { display: none; }
  .auth-form-panel {
    padding: 24px 16px;
    min-height: 100vh;
    background: linear-gradient(180deg, #F0F5F4 0%, #E8EEEF 50%, #F0F5F4 100%);
  }
  .auth-form-box {
    max-width: 100%;
    padding: 28px 22px;
    border-radius: 16px;
    margin: 0 auto;
  }
}
@media (max-width: 480px) {
  .auth-form-panel { padding: 16px 12px; }
  .auth-form-box {
    padding: 24px 18px;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .auth-form-header { margin-bottom: 20px; }
  .auth-form-header h2 { font-size: 1.3rem; }
  .auth-form-header p { font-size: 0.82rem; }
  .form-control {
    padding: 10px 12px 10px 36px;
    font-size: 0.85rem;
  }
  .input-icon { left: 12px; font-size: 0.8rem; }
  .form-label { font-size: 0.74rem; }
  .btn-lg { padding: 12px 20px; font-size: 0.88rem; }
  .flash-msg { font-size: 0.78rem; padding: 10px 12px; }
}
</style>
</head>
<body>
{% block body %}{% endblock %}
<script>
/* Flash auto-dismiss */
document.querySelectorAll('.flash-msg').forEach(function(el) {
  setTimeout(function() {
    el.style.transition = 'opacity 0.4s';
    el.style.opacity = '0';
    setTimeout(function() { el.remove(); }, 400);
  }, 5000);
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
