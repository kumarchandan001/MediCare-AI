<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — MediCare AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/medicare.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .denied-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 3rem 2.5rem;
      max-width: 440px;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .denied-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--danger-bg); color: var(--danger);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 1.5rem;
    }
    .denied-title { font-family: var(--font-display); font-weight: 700; font-size: 1.5rem; color: var(--text); margin-bottom: .5rem; }
    .denied-msg { font-size: .9rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 2rem; }
    .denied-actions { display: flex; gap: 12px; justify-content: center; }
    .denied-actions .btn { padding: 10px 24px; border-radius: var(--radius-md); font-size: .85rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none; transition: all 200ms; }
    .btn-back { background: var(--primary); color: #fff; }
    .btn-back:hover { background: var(--primary-600); }
    .btn-login { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-login:hover { background: var(--surface-3); }
    .denied-code { font-size: .72rem; color: var(--text-muted); margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="denied-card">
    <div class="denied-icon"><i class="fas fa-shield-halved"></i></div>
    <div class="denied-title">Access Denied</div>
    <div class="denied-msg">
      You don't have administrator privileges to access this panel.<br>
      Only users with admin access can view the Admin Control Panel.
    </div>
    <div class="denied-actions">
      <a href="{{ url_for('home') }}" class="btn btn-back"><i class="fas fa-arrow-left"></i> Go to Dashboard</a>
      <a href="{{ url_for('auth.logout') }}" class="btn btn-login"><i class="fas fa-right-from-bracket"></i> Switch Account</a>
    </div>
    <div class="denied-code">Error 403 · Insufficient permissions</div>
  </div>
</body>
</html>
