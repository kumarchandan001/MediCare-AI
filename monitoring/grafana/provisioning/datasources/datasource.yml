# ═══════════════════════════════════════════════════════════════════
# Grafana — Automatic Datasource Provisioning
# ═══════════════════════════════════════════════════════════════════
# Place this file at: monitoring/grafana/provisioning/datasources/datasource.yml
#
# Automatically configures Prometheus as the default
# Grafana datasource on container startup.
# ═══════════════════════════════════════════════════════════════════

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
