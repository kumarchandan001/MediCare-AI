# ═══════════════════════════════════════════════════════════════════
# MediCare AI — Prometheus Monitoring Configuration
# ═══════════════════════════════════════════════════════════════════
# This file configures Prometheus to scrape metrics from the
# MediCare AI backend and infrastructure services.
#
# Usage:
#   Mount this file into a Prometheus container:
#   volumes:
#     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
# ═══════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ── MediCare AI Backend ────────────────────────
  - job_name: "medicare-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "medicare-backend"
          environment: "production"

  # ── Redis Exporter ─────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  # ── PostgreSQL Exporter ────────────────────────
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"

  # ── Nginx (Frontend) ──────────────────────────
  - job_name: "nginx"
    static_configs:
      - targets: ["frontend:80"]
        labels:
          service: "medicare-frontend"
